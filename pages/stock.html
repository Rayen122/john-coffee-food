<!-- Stock Page -->
<div id="stock-page" class="page">
    <div class="page-header"
        style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.25rem;">
        <h2 style="margin:0;">📦 Gestion du Stock</h2>
        <button type="button" class="btn btn-primary" id="addStockItemBtn" onclick="UI.openStockModal()">
            + Ajouter un article
        </button>
    </div>

    <!-- Filters -->
    <div class="menu-filters" style="margin-bottom:1rem;">
        <input type="text" id="stockSearch" placeholder="Rechercher un article..." class="input-search"
            oninput="UI.filterStock()">
        <select id="stockCategoryFilter" onchange="UI.filterStock()">
            <option value="">Toutes les catégories</option>
        </select>
        <select id="stockStatusFilter" onchange="UI.filterStock()">
            <option value="">Tous les statuts</option>
            <option value="ok">✅ OK</option>
            <option value="low">⚠️ Stock bas</option>
            <option value="out">❌ Rupture</option>
        </select>
    </div>

    <!-- Summary badges -->
    <div id="stockSummary" style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.25rem;"></div>

    <!-- Stock grid -->
    <div class="menu-grid" id="stockGrid"></div>
</div>

<!-- Stock Modal -->
<div id="stockModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)UI.closeStockModal()">
    <div class="modal-content" style="max-width:480px;">
        <div class="modal-header">
            <h3 id="stockModalTitle">Ajouter un article</h3>
            <button type="button" class="btn-close" onclick="UI.closeStockModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="stockItemId">
            <div class="form-group">
                <label class="form-label">Nom de l'article *</label>
                <input type="text" id="stockItemName" class="form-input" placeholder="ex: Café moulu">
            </div>
            <div class="form-group">
                <label class="form-label">Catégorie</label>
                <select id="stockItemCategory" class="form-input"></select>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
                <div class="form-group">
                    <label class="form-label">Quantité *</label>
                    <input type="number" id="stockItemQuantity" class="form-input" min="0" step="0.01" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Unité</label>
                    <input type="text" id="stockItemUnit" class="form-input" placeholder="kg, L, pcs…">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Seuil d'alerte (stock bas)</label>
                <input type="number" id="stockItemMin" class="form-input" min="0" step="0.01" placeholder="ex: 2">
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="UI.closeStockModal()">Annuler</button>
            <button type="button" class="btn btn-primary" id="saveStockItemBtn"
                onclick="UI.saveStockItem()">Enregistrer</button>
        </div>
    </div>
</div>
