<!-- Stats Page (Part 1) -->
<div id="stats-page" class="page">
  <div class="page-header-row">
    <h2>📈 Statistiques de Ventes</h2>
    <div class="page-header-actions">
      <!-- Le filtre de période a été supprimé car les statistiques sont maintenant synchronisées avec le calendrier en bas de page -->
    </div>
  </div>

  <div class="stats-container"
    style="margin-top: 1.5rem; background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm);">
    <h3 id="statsTitle" style="margin-bottom: 1.5rem; color: var(--text-primary);">Ventes par jour</h3>
    <div style="width: 100%; height: 400px; position: relative;">
      <canvas id="productSalesChart"></canvas>
    </div>
  </div>

  <div class="stats-summary-grid"
    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
    <div class="stat-card">
      <span class="stat-label">Total Ventes (Mois)</span>
      <div class="stat-value" id="statsTotalMonth">0,00 DT</div>
    </div>
    <div class="stat-card status-paid">
      <span class="stat-label">🌟 Produit le plus vendu</span>
      <div class="stat-value" id="statsBestProduct" style="font-size: 1.1rem; line-height: 1.2;">-</div>
    </div>
    <div class="stat-card status-occupied">
      <span class="stat-label">📅 Meilleur jour du mois</span>
      <div class="stat-value" id="statsBestDay" style="font-size: 1.1rem; line-height: 1.2;">-</div>
    </div>
  </div>
