<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.jpg" alt="John Coffee Food">
    </div>
    <h2 class="login-title">John Coffee Food</h2>
    <p class="login-subtitle">Connectez-vous pour accéder à la gestion</p>
    <form id="loginForm" autocomplete="off">
      <div class="login-field">
        <label for="loginEmail">Identifiant</label>
        <input type="text" id="loginEmail" placeholder="Votre identifiant" required>
      </div>
      <div class="login-field">
        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="Votre mot de passe" required>
      </div>
      <p class="login-error" id="loginError"></p>
      <button type="submit" class="btn btn-primary login-btn">Se connecter</button>
    </form>
  </div>
</div>
