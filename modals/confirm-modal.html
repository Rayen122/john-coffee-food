<!-- Confirm Modal -->
<div class="modal" id="confirmModal" style="z-index: 2000;">
  <div class="modal-content">
    <h3 id="confirmModalTitle">Confirmation</h3>
    <p id="confirmModalMessage"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="confirmModalCancel">Annuler</button>
      <button type="button" class="btn btn-primary" id="confirmModalOk">Confirmer</button>
    </div>
  </div>
</div>
