<!-- Add Table Modal -->
<div class="modal" id="addTableModal">
  <div class="modal-content">
    <h3>Ajouter une table</h3>
    <form id="addTableForm">
      <div class="form-group">
        <label for="addTableName">Nom de la table</label>
        <input type="text" id="addTableName" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary close-modal" data-modal="addTableModal">Annuler</button>
        <button type="submit" class="btn btn-primary">Ajouter</button>
      </div>
    </form>
  </div>
</div>
